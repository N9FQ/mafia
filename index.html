<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="mobile-web-app-capable" content="yes" />
<title>المافيا</title>
<style>
  html, body { margin:0; padding:0; background:#050506; }
</style>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ---------- helpers ----------
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function defaultCounts(n) {
  const mafia = Math.max(1, Math.floor(n / 4));
  const detective = n >= 5 ? 1 : 0;
  const doctor = n >= 6 ? 1 : 0;
  return { mafia, detective, doctor };
}

const ROLE_INFO = {
  mafia: {
    label: "المافيا",
    color: "#9c2b45",
    desc: "مهمتك التخلص من القرويين ليلاً دون كشف هويتك. تعاون مع بقية المافيا لاختيار ضحية كل ليلة.",
  },
  detective: {
    label: "المحقق",
    color: "#3d6b8a",
    desc: "كل ليلة تقدر تتحرى عن شخص وحد لتعرف إن كان من المافيا أو لا.",
  },
  doctor: {
    label: "الطبيب",
    color: "#3d8a5f",
    desc: "كل ليلة تقدر تحمي شخص واحد من هجوم المافيا — تقدر تحمي نفسك.",
  },
  villager: {
    label: "قروي",
    color: "#8a7a3d",
    desc: "ما عندك قدرات خاصة. مهمتك تراقب وتتكلم وتصوّت بذكاء عشان تكشف المافيا.",
  },
};

const SAVE_KEY = "mafiaGameState_v1";

function loadSaved() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (e) {
    return null;
  }
}

function MafiaGame() {
  const saved = loadSaved();

  const [phase, setPhase] = useState(saved?.phase ?? "setup");
  const [playerCount, setPlayerCount] = useState(saved?.playerCount ?? 6);
  const [names, setNames] = useState(
    saved?.names ?? Array.from({ length: 6 }, (_, i) => `اللاعب ${i + 1}`)
  );
  const [counts, setCounts] = useState(saved?.counts ?? defaultCounts(6));
  const [discussMinutes, setDiscussMinutes] = useState(saved?.discussMinutes ?? 3);

  const [players, setPlayers] = useState(saved?.players ?? []); // {id,name,role,alive}
  const [revealIndex, setRevealIndex] = useState(saved?.revealIndex ?? 0);
  const [hasViewed, setHasViewed] = useState(false);
  const [pressed, setPressed] = useState(false);

  const [round, setRound] = useState(saved?.round ?? 1);
  const [mafiaTarget, setMafiaTarget] = useState(saved?.mafiaTarget ?? null);
  const [doctorSave, setDoctorSave] = useState(saved?.doctorSave ?? null);
  const [detectiveTarget, setDetectiveTarget] = useState(saved?.detectiveTarget ?? null);
  const [detectiveResult, setDetectiveResult] = useState(saved?.detectiveResult ?? null);
  const [detectiveRevealed, setDetectiveRevealed] = useState(saved?.detectiveRevealed ?? false);
  const [nightVictim, setNightVictim] = useState(saved?.nightVictim ?? null); // resolved after night
  const [voteChoice, setVoteChoice] = useState(saved?.voteChoice ?? null);
  const [lastEliminated, setLastEliminated] = useState(saved?.lastEliminated ?? null);
  const [winner, setWinner] = useState(saved?.winner ?? null);
  const [log, setLog] = useState(saved?.log ?? []);

  const [timeLeft, setTimeLeft] = useState(0);
  const timerRef = useRef(null);

  // persist game progress so reopening the link resumes instead of restarting
  useEffect(() => {
    try {
      localStorage.setItem(
        SAVE_KEY,
        JSON.stringify({
          phase, playerCount, names, counts, discussMinutes,
          players, revealIndex, round, mafiaTarget, doctorSave,
          detectiveTarget, detectiveResult, detectiveRevealed,
          nightVictim, voteChoice, lastEliminated, winner, log,
        })
      );
    } catch (e) {}
  }, [phase, playerCount, names, counts, discussMinutes, players, revealIndex,
      round, mafiaTarget, doctorSave, detectiveTarget, detectiveResult,
      detectiveRevealed, nightVictim, voteChoice, lastEliminated, winner, log]);

  // keep names array in sync with playerCount (skip on first mount so restored state isn't wiped)
  const didMountRef = useRef(false);
  useEffect(() => {
    if (!didMountRef.current) {
      didMountRef.current = true;
      return;
    }
    setNames((prev) => {
      const next = [...prev];
      while (next.length < playerCount) next.push(`اللاعب ${next.length + 1}`);
      while (next.length > playerCount) next.pop();
      return next;
    });
    setCounts(defaultCounts(playerCount));
  }, [playerCount]);

  function updateCount(role, delta) {
    setCounts((c) => {
      const next = { ...c, [role]: Math.max(0, c[role] + delta) };
      return next;
    });
  }

  const villagerCount = Math.max(
    0,
    playerCount - counts.mafia - counts.detective - counts.doctor
  );
  const validSetup = counts.mafia >= 1 && villagerCount >= 0 &&
    counts.mafia + counts.detective + counts.doctor <= playerCount;

  function startGame() {
    const roleList = [
      ...Array(counts.mafia).fill("mafia"),
      ...Array(counts.detective).fill("detective"),
      ...Array(counts.doctor).fill("doctor"),
      ...Array(villagerCount).fill("villager"),
    ];
    const shuffledRoles = shuffle(roleList);
    const newPlayers = names.map((name, i) => ({
      id: i,
      name: name.trim() || `اللاعب ${i + 1}`,
      role: shuffledRoles[i],
      alive: true,
    }));
    setPlayers(newPlayers);
    setRevealIndex(0);
    setHasViewed(false);
    setPressed(false);
    setRound(1);
    setLog([]);
    setWinner(null);
    setPhase("roles");
  }

  function nextReveal() {
    if (revealIndex + 1 < players.length) {
      setRevealIndex(revealIndex + 1);
      setHasViewed(false);
      setPressed(false);
    } else {
      goToNight();
    }
  }

  function goToNight() {
    setMafiaTarget(null);
    setDoctorSave(null);
    setDetectiveTarget(null);
    setDetectiveResult(null);
    setDetectiveRevealed(false);
    setPhase("night-sleep");
  }

  const alivePlayers = players.filter((p) => p.alive);
  const aliveMafia = alivePlayers.filter((p) => p.role === "mafia");
  const hasDetective = players.some((p) => p.role === "detective" && p.alive);
  const hasDoctor = players.some((p) => p.role === "doctor" && p.alive);

  function resolveNight() {
    let victimId = mafiaTarget;
    if (doctorSave !== null && doctorSave === mafiaTarget) {
      victimId = null;
    }
    let updatedPlayers = players;
    if (victimId !== null) {
      updatedPlayers = players.map((p) =>
        p.id === victimId ? { ...p, alive: false } : p
      );
      setPlayers(updatedPlayers);
    }
    setNightVictim(victimId);
    setLog((l) => [
      ...l,
      victimId !== null
        ? `الليلة ${round}: تم القضاء على ${players.find((p) => p.id === victimId)?.name}`
        : `الليلة ${round}: نجا الجميع من هجوم الليلة`,
    ]);
    const result = checkWinner(updatedPlayers);
    if (result) {
      setWinner(result);
      setPhase("end");
    } else {
      setPhase("night-result");
    }
  }

  function checkWinner(list) {
    const alive = list.filter((p) => p.alive);
    const mafiaAlive = alive.filter((p) => p.role === "mafia").length;
    const othersAlive = alive.length - mafiaAlive;
    if (mafiaAlive === 0) return "village";
    if (mafiaAlive >= othersAlive) return "mafia";
    return null;
  }

  function startDiscussion() {
    setVoteChoice(null);
    setTimeLeft(discussMinutes * 60);
    setPhase("day-discuss");
  }

  useEffect(() => {
    if (phase === "day-discuss" && timeLeft > 0) {
      timerRef.current = setInterval(() => {
        setTimeLeft((t) => {
          if (t <= 1) {
            clearInterval(timerRef.current);
            return 0;
          }
          return t - 1;
        });
      }, 1000);
      return () => clearInterval(timerRef.current);
    }
  }, [phase, timeLeft === discussMinutes * 60]);

  function confirmVote() {
    if (voteChoice === null) return;
    const eliminated = players.find((p) => p.id === voteChoice);
    const updated = players.map((p) =>
      p.id === voteChoice ? { ...p, alive: false } : p
    );
    setPlayers(updated);
    setLastEliminated(eliminated);
    setLog((l) => [
      ...l,
      `النهار ${round}: تم طرد ${eliminated.name} (${ROLE_INFO[eliminated.role].label})`,
    ]);
    const result = checkWinner(updated);
    if (result) {
      setWinner(result);
      setPhase("end");
    } else {
      setPhase("day-result");
    }
  }

  function nextRound() {
    setRound((r) => r + 1);
    goToNight();
  }

  function resetGame() {
    try { localStorage.removeItem(SAVE_KEY); } catch (e) {}
    setPhase("setup");
  }

  const fmt = (s) => {
    const m = Math.floor(s / 60)
      .toString()
      .padStart(2, "0");
    const sec = (s % 60).toString().padStart(2, "0");
    return `${m}:${sec}`;
  };

  return (
    <div dir="rtl" lang="ar" className="stage">
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Tajawal:wght@400;500;700&display=swap');

        * {
          box-sizing: border-box;
          -webkit-tap-highlight-color: transparent;
          -webkit-touch-callout: none;
        }
        html, body {
          overscroll-behavior: none;
        }
        .stage {
          min-height: 100vh;
          min-height: 100dvh;
          width: 100%;
          background: radial-gradient(ellipse at 50% -10%, #23222b 0%, #0b0b0f 55%, #050506 100%);
          color: #ece5d8;
          font-family: 'Tajawal', sans-serif;
          display: flex;
          flex-direction: column;
          align-items: center;
          padding: calc(28px + env(safe-area-inset-top)) 16px calc(48px + env(safe-area-inset-bottom));
          position: relative;
          overflow-x: hidden;
          overscroll-behavior: none;
          user-select: none;
          -webkit-user-select: none;
        }
        input[type=text] { user-select: text; -webkit-user-select: text; }
        .stage::before {
          content: '';
          position: absolute;
          inset: 0;
          background-image: radial-gradient(rgba(255,255,255,0.025) 1px, transparent 1px);
          background-size: 3px 3px;
          pointer-events: none;
        }
        h1, h2, h3 { font-family: 'Cairo', sans-serif; margin: 0; }
        .title {
          font-weight: 900;
          font-size: 28px;
          letter-spacing: 1px;
          color: #d4a73a;
          text-shadow: 0 0 18px rgba(212,167,58,0.35);
          margin-bottom: 24px;
        }
        .panel {
          background: linear-gradient(180deg, #17171c 0%, #111116 100%);
          border: 1px solid #2a2a32;
          border-radius: 14px;
          padding: 20px;
          width: 100%;
          max-width: 420px;
          box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .row {
          display: flex;
          align-items: center;
          justify-content: space-between;
          margin-bottom: 14px;
        }
        .stepper {
          display: flex;
          align-items: center;
          gap: 10px;
        }
        .stepper button {
          width: 32px; height: 32px;
          border-radius: 8px;
          border: 1px solid #3a3a44;
          background: #1e1e24;
          color: #ece5d8;
          font-size: 18px;
          cursor: pointer;
        }
        .stepper button:active { transform: scale(0.95); }
        .stepper span { min-width: 24px; text-align: center; font-weight: 700; font-family: 'Cairo', sans-serif; }
        label.small { font-size: 13px; color: #a89f8d; }
        input[type=text] {
          background: #1c1c22;
          border: 1px solid #33333c;
          border-radius: 8px;
          color: #ece5d8;
          padding: 8px 10px;
          font-family: 'Tajawal', sans-serif;
          font-size: 14px;
          width: 100%;
        }
        .name-list { max-height: 200px; overflow-y: auto; margin: 10px 0; display: flex; flex-direction: column; gap: 8px; padding-left: 4px; }
        .role-count-label { display:flex; align-items:center; gap:8px; }
        .dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
        .btn-primary {
          width: 100%;
          padding: 14px;
          border-radius: 10px;
          border: none;
          background: linear-gradient(180deg, #d4a73a, #b3872a);
          color: #1a1408;
          font-family: 'Cairo', sans-serif;
          font-weight: 900;
          font-size: 16px;
          cursor: pointer;
          margin-top: 10px;
          box-shadow: 0 8px 20px rgba(212,167,58,0.25);
        }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; box-shadow:none; }
        .btn-secondary {
          width: 100%;
          padding: 12px;
          border-radius: 10px;
          border: 1px solid #3a3a44;
          background: transparent;
          color: #ece5d8;
          font-family: 'Cairo', sans-serif;
          font-weight: 700;
          font-size: 14px;
          cursor: pointer;
          margin-top: 10px;
        }
        .helper { font-size: 12px; color: #7a7364; margin-top: 6px; text-align: center; }

        /* role reveal card */
        .reveal-wrap { display:flex; flex-direction:column; align-items:center; gap:18px; width:100%; max-width:380px; }
        .player-name { font-family:'Cairo', sans-serif; font-weight:900; font-size:20px; color:#ece5d8; }
        .card {
          width: 260px;
          height: 340px;
          border-radius: 18px;
          position: relative;
          display:flex; align-items:center; justify-content:center;
          background: repeating-linear-gradient(135deg, #141419, #141419 10px, #17171d 10px, #17171d 20px);
          border: 1px solid #2c2c34;
          box-shadow: inset 0 0 60px rgba(0,0,0,0.6);
          user-select: none;
          -webkit-user-select: none;
          touch-action: none;
        }
        .card .hint {
          color: #5f5a4e;
          font-family: 'Cairo', sans-serif;
          font-size: 14px;
          text-align: center;
          padding: 0 20px;
        }
        .card .role-content {
          text-align: center;
          padding: 20px;
        }
        .role-name {
          font-family:'Cairo', sans-serif;
          font-weight: 900;
          font-size: 30px;
          margin-bottom: 10px;
        }
        .role-desc { font-size: 14px; color:#c9c2b3; line-height:1.6; }
        .glow-overlay {
          position: absolute;
          inset: 0;
          border-radius: 18px;
          pointer-events: none;
          transition: opacity 0.25s ease;
        }
        .match-btn {
          font-family:'Cairo', sans-serif;
          font-weight:700;
          font-size: 15px;
          padding: 12px 24px;
          border-radius: 30px;
          border: 1px solid #4a3f22;
          background: #201a0d;
          color: #d4a73a;
          cursor: pointer;
        }
        .progress-dots { display:flex; gap:6px; margin-top:6px; }
        .progress-dots span { width:7px; height:7px; border-radius:50%; background:#2e2e36; }
        .progress-dots span.done { background:#d4a73a; }

        /* night / day */
        .info-box {
          text-align:center;
          margin-bottom: 18px;
        }
        .phase-tag {
          display:inline-block;
          font-family:'Cairo', sans-serif;
          font-weight:700;
          font-size: 12px;
          letter-spacing:1px;
          padding: 4px 12px;
          border-radius: 20px;
          margin-bottom: 10px;
        }
        .tag-night { background: rgba(61,107,138,0.15); color:#6ea8cf; border:1px solid #2c4a5e; }
        .tag-day { background: rgba(212,167,58,0.15); color:#d4a73a; border:1px solid #5a4a22; }
        .instruction { font-size: 15px; color:#ece5d8; line-height:1.7; max-width:380px; margin: 0 auto; }
        .player-grid {
          display:grid;
          grid-template-columns: repeat(2, 1fr);
          gap: 10px;
          width: 100%;
          max-width: 420px;
          margin: 16px 0;
        }
        .player-chip {
          padding: 12px 10px;
          border-radius: 10px;
          border: 1px solid #2c2c34;
          background: #17171c;
          text-align:center;
          font-family:'Cairo', sans-serif;
          font-weight:700;
          font-size:14px;
          cursor:pointer;
        }
        .player-chip.selected {
          border-color: #d4a73a;
          background: rgba(212,167,58,0.12);
          color: #d4a73a;
        }
        .player-chip.dead { opacity:0.3; text-decoration: line-through; cursor:default; }
        .timer {
          font-family:'Cairo', sans-serif;
          font-weight:900;
          font-size: 44px;
          color: #d4a73a;
          text-align:center;
          letter-spacing:2px;
        }
        .result-card {
          text-align:center;
          padding: 20px;
          border-radius: 14px;
          border: 1px solid #2a2a32;
          background:#141418;
          max-width: 380px;
          margin-bottom: 16px;
        }
        .end-title { font-size:26px; margin-bottom:6px; }
        .log-list { font-size:13px; color:#948c7c; max-width:380px; margin-top: 14px; line-height:1.9; text-align:right; }
      `}</style>

      <div className="title">🔪 المافيا 🩸</div>

      {phase === "setup" && (
        <div className="panel">
          <div className="row">
            <label>عدد اللاعبين</label>
            <div className="stepper">
              <button onClick={() => setPlayerCount((n) => Math.min(16, n + 1))}>+</button>
              <span>{playerCount}</span>
              <button onClick={() => setPlayerCount((n) => Math.max(4, n - 1))}>−</button>
            </div>
          </div>

          <label className="small">أسماء اللاعبين</label>
          <div className="name-list">
            {names.map((n, i) => (
              <input
                key={i}
                type="text"
                value={n}
                onChange={(e) => {
                  const next = [...names];
                  next[i] = e.target.value;
                  setNames(next);
                }}
              />
            ))}
          </div>

          <div style={{ borderTop: "1px solid #262630", margin: "14px 0" }} />

          <div className="row">
            <div className="role-count-label">
              <span className="dot" style={{ background: ROLE_INFO.mafia.color }} />
              مافيا
            </div>
            <div className="stepper">
              <button onClick={() => updateCount("mafia", 1)}>+</button>
              <span>{counts.mafia}</span>
              <button onClick={() => updateCount("mafia", -1)}>−</button>
            </div>
          </div>
          <div className="row">
            <div className="role-count-label">
              <span className="dot" style={{ background: ROLE_INFO.detective.color }} />
              محقق
            </div>
            <div className="stepper">
              <button onClick={() => updateCount("detective", 1)}>+</button>
              <span>{counts.detective}</span>
              <button onClick={() => updateCount("detective", -1)}>−</button>
            </div>
          </div>
          <div className="row">
            <div className="role-count-label">
              <span className="dot" style={{ background: ROLE_INFO.doctor.color }} />
              طبيب
            </div>
            <div className="stepper">
              <button onClick={() => updateCount("doctor", 1)}>+</button>
              <span>{counts.doctor}</span>
              <button onClick={() => updateCount("doctor", -1)}>−</button>
            </div>
          </div>
          <div className="row" style={{ marginBottom: 0 }}>
            <div className="role-count-label">
              <span className="dot" style={{ background: ROLE_INFO.villager.color }} />
              قرويين (تلقائي)
            </div>
            <span style={{ fontFamily: "Cairo", fontWeight: 700 }}>{villagerCount}</span>
          </div>

          <div style={{ borderTop: "1px solid #262630", margin: "14px 0" }} />

          <div className="row" style={{ marginBottom: 0 }}>
            <label>مدة نقاش النهار (دقائق)</label>
            <div className="stepper">
              <button onClick={() => setDiscussMinutes((m) => Math.min(10, m + 1))}>+</button>
              <span>{discussMinutes}</span>
              <button onClick={() => setDiscussMinutes((m) => Math.max(1, m - 1))}>−</button>
            </div>
          </div>

          <button className="btn-primary" disabled={!validSetup} onClick={startGame}>
            ابدأ اللعبة
          </button>
          {!validSetup && (
            <div className="helper">تأكد إن عدد الأدوار المحددة ما يتجاوز عدد اللاعبين</div>
          )}
        </div>
      )}

      {phase === "roles" && players.length > 0 && (
        <div className="reveal-wrap">
          <div className="player-name">مرر الجوال إلى: {players[revealIndex].name}</div>
          <div
            className="card"
            onMouseDown={() => { setPressed(true); setHasViewed(true); }}
            onMouseUp={() => setPressed(false)}
            onMouseLeave={() => setPressed(false)}
            onTouchStart={() => { setPressed(true); setHasViewed(true); }}
            onTouchEnd={() => setPressed(false)}
          >
            <div
              className="glow-overlay"
              style={{
                opacity: pressed ? 1 : 0,
                boxShadow: pressed
                  ? `inset 0 0 70px ${ROLE_INFO[players[revealIndex].role].color}55, 0 0 40px ${ROLE_INFO[players[revealIndex].role].color}66`
                  : "none",
              }}
            />
            {pressed ? (
              <div className="role-content">
                <div className="role-name" style={{ color: ROLE_INFO[players[revealIndex].role].color }}>
                  {ROLE_INFO[players[revealIndex].role].label}
                </div>
                <div className="role-desc">{ROLE_INFO[players[revealIndex].role].desc}</div>
              </div>
            ) : (
              <div className="hint">🕯️<br />اضغط مطولًا على البطاقة<br />لترى دورك السري</div>
            )}
          </div>
          <button className="btn-primary" disabled={!hasViewed} onClick={nextReveal}>
            {revealIndex + 1 < players.length ? "التالي" : "ابدأ الليلة الأولى"}
          </button>
          <div className="progress-dots">
            {players.map((_, i) => (
              <span key={i} className={i <= revealIndex ? "done" : ""} />
            ))}
          </div>
        </div>
      )}

      {phase === "night-sleep" && (
        <div className="panel" style={{ textAlign: "center" }}>
          <span className="phase-tag tag-night">🌙 الليلة {round}</span>
          <div className="instruction">
            على الجميع إغلاق أعينهم الآن.<br />مرّر الجوال للاعب الذي يمسك الهاتف (الراوي) واضغط متابعة عندما يكون الجميع نائمين.
          </div>
          <button className="btn-primary" onClick={() => setPhase("night-mafia")}>متابعة</button>
        </div>
      )}

      {phase === "night-mafia" && (
        <div style={{ width: "100%", maxWidth: 420, textAlign: "center" }}>
          <span className="phase-tag tag-night">🌙 الليلة {round}</span>
          <div className="instruction">لتفتح المافيا أعينها وتتفق سرًا على ضحية الليلة.</div>
          <div className="player-grid">
            {alivePlayers.map((p) => (
              <div
                key={p.id}
                className={`player-chip ${mafiaTarget === p.id ? "selected" : ""}`}
                onClick={() => setMafiaTarget(p.id)}
              >
                {p.name}
              </div>
            ))}
          </div>
          <button
            className="btn-primary"
            disabled={mafiaTarget === null}
            onClick={() => setPhase(hasDoctor ? "night-doctor" : hasDetective ? "night-detective" : "night-final")}
          >
            تأكيد واغلق أعين المافيا
          </button>
        </div>
      )}

      {phase === "night-doctor" && (
        <div style={{ width: "100%", maxWidth: 420, textAlign: "center" }}>
          <span className="phase-tag tag-night">🌙 الليلة {round}</span>
          <div className="instruction">ليفتح الطبيب عينيه ويختار شخصًا لحمايته الليلة.</div>
          <div className="player-grid">
            {alivePlayers.map((p) => (
              <div
                key={p.id}
                className={`player-chip ${doctorSave === p.id ? "selected" : ""}`}
                onClick={() => setDoctorSave(p.id)}
              >
                {p.name}
              </div>
            ))}
          </div>
          <button
            className="btn-primary"
            disabled={doctorSave === null}
            onClick={() => setPhase(hasDetective ? "night-detective" : "night-final")}
          >
            تأكيد واغلق عيني الطبيب
          </button>
        </div>
      )}

      {phase === "night-detective" && (
        <div style={{ width: "100%", maxWidth: 420, textAlign: "center" }}>
          <span className="phase-tag tag-night">🌙 الليلة {round}</span>
          {!detectiveRevealed ? (
            <>
              <div className="instruction">ليفتح المحقق عينيه ويختار شخصًا للتحري عنه.</div>
              <div className="player-grid">
                {alivePlayers.map((p) => (
                  <div
                    key={p.id}
                    className={`player-chip ${detectiveTarget === p.id ? "selected" : ""}`}
                    onClick={() => setDetectiveTarget(p.id)}
                  >
                    {p.name}
                  </div>
                ))}
              </div>
              <button
                className="btn-primary"
                disabled={detectiveTarget === null}
                onClick={() => {
                  const target = players.find((p) => p.id === detectiveTarget);
                  setDetectiveResult(target.role === "mafia");
                  setDetectiveRevealed(true);
                }}
              >
                كشف النتيجة
              </button>
            </>
          ) : (
            <>
              <div className="result-card">
                <div style={{ fontFamily: "Cairo", fontWeight: 900, fontSize: 20, color: detectiveResult ? "#9c2b45" : "#3d8a5f" }}>
                  {detectiveResult ? "هذا الشخص من المافيا 🔪" : "هذا الشخص ليس من المافيا ✅"}
                </div>
              </div>
              <div className="instruction">أرِ هذه النتيجة للمحقق فقط، ثم أغلق عينيه.</div>
              <button className="btn-primary" onClick={() => setPhase("night-final")}>متابعة</button>
            </>
          )}
        </div>
      )}

      {phase === "night-final" && (
        <div className="panel" style={{ textAlign: "center" }}>
          <span className="phase-tag tag-night">🌙 الليلة {round}</span>
          <div className="instruction">
            ليفتح الجميع أعينهم الآن.<br />القرية تستيقظ لترى ما حدث الليلة الماضية...
          </div>
          <button className="btn-primary" onClick={resolveNight}>كشف نتيجة الليلة</button>
        </div>
      )}

      {phase === "night-result" && (
        <div className="panel" style={{ textAlign: "center" }}>
          <span className="phase-tag tag-night">نتيجة الليلة {round}</span>
          {nightVictim !== null ? (
            <div className="instruction">
              تم العثور على <b>{players.find((p) => p.id === nightVictim)?.name}</b> ضحية هذه الليلة.
            </div>
          ) : (
            <div className="instruction">نجا الجميع الليلة! يبدو أن الطبيب كان يقظًا.</div>
          )}
          <button className="btn-primary" onClick={startDiscussion}>ابدأ نقاش النهار</button>
        </div>
      )}

      {phase === "day-discuss" && (
        <div className="panel" style={{ textAlign: "center" }}>
          <span className="phase-tag tag-day">☀️ النهار {round}</span>
          <div className="instruction" style={{ marginBottom: 14 }}>ناقشوا من تشكّون أنه من المافيا.</div>
          <div className="timer">{fmt(timeLeft)}</div>
          <button className="btn-secondary" onClick={() => setPhase("day-vote")}>
            {timeLeft === 0 ? "انتقل للتصويت" : "تخطي المؤقت والتصويت الآن"}
          </button>
        </div>
      )}

      {phase === "day-vote" && (
        <div style={{ width: "100%", maxWidth: 420, textAlign: "center" }}>
          <span className="phase-tag tag-day">☀️ النهار {round}</span>
          <div className="instruction">صوتوا بصوت عالٍ، ثم اختر اللاعب صاحب أكثر الأصوات لطرده.</div>
          <div className="player-grid">
            {alivePlayers.map((p) => (
              <div
                key={p.id}
                className={`player-chip ${voteChoice === p.id ? "selected" : ""}`}
                onClick={() => setVoteChoice(p.id)}
              >
                {p.name}
              </div>
            ))}
          </div>
          <button className="btn-primary" disabled={voteChoice === null} onClick={confirmVote}>
            تأكيد الطرد
          </button>
        </div>
      )}

      {phase === "day-result" && lastEliminated && (
        <div className="panel" style={{ textAlign: "center" }}>
          <span className="phase-tag tag-day">نتيجة النهار {round}</span>
          <div className="instruction">
            تم طرد <b>{lastEliminated.name}</b>.<br />
            كان دوره: <span style={{ color: ROLE_INFO[lastEliminated.role].color, fontWeight: 700 }}>
              {ROLE_INFO[lastEliminated.role].label}
            </span>
          </div>
          <button className="btn-primary" onClick={nextRound}>ابدأ الليلة التالية</button>
        </div>
      )}

      {phase === "end" && (
        <div className="panel" style={{ textAlign: "center" }}>
          <div className="end-title" style={{ color: winner === "mafia" ? "#9c2b45" : "#d4a73a" }}>
            {winner === "mafia" ? "🔪 فازت المافيا!" : "🏘️ فاز القرويون!"}
          </div>
          <div className="instruction" style={{ marginBottom: 10 }}>الأدوار الكاملة:</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 10 }}>
            {players.map((p) => (
              <div key={p.id} style={{ display: "flex", justifyContent: "space-between", fontSize: 14 }}>
                <span>{p.name} {!p.alive && "☠️"}</span>
                <span style={{ color: ROLE_INFO[p.role].color, fontWeight: 700 }}>{ROLE_INFO[p.role].label}</span>
              </div>
            ))}
          </div>
          {log.length > 0 && (
            <div className="log-list">
              {log.map((l, i) => <div key={i}>• {l}</div>)}
            </div>
          )}
          <button className="btn-primary" onClick={resetGame}>لعبة جديدة</button>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<MafiaGame />);
</script>
</body>
</html>
